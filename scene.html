<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Owl Vision | First person nighttime exploration</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        #controls-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            border: 1px solid rgba(212,168,44,0.5);
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            pointer-events: auto;
        }
        .back-btn:hover {
            background: rgba(212,168,44,0.8);
            transform: scale(1.02);
        }
        .lock-status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #FFD966;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            pointer-events: none;
            z-index: 100;
        }
        @media (max-width: 600px) {
            #controls-hint, #info { font-size: 10px; padding: 4px 12px; }
            .back-btn { padding: 6px 14px; font-size: 12px; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="scene-container"></div>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回主页</a>
    <div id="info">🦉 Owl's First Perspective: Nighttime Exploration</div>
    <div id="controls-hint">🖱️ Click the mouse to lock the perspective | WASD moves | Look around with the mouse</div>
    <div class="lock-status" id="lock-status">🔒 Click on the screen to lock the mouse</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 初始化场景、相机、渲染器 ---
        const container = document.getElementById('scene-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008); // 轻雾增强景深感

        // 第一人称相机：放置在猫头鹰眼睛高度（后期可调整）
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(1.4, 1.3, -7); // 初始位置，稍后根据模型位置微调
        camera.rotation.order = 'YXZ';   // 确保欧拉角正确

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- 灯光系统（保持原有光照，增强立体感）---
        const ambient = new THREE.AmbientLight(0x404060, 0.7);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        mainLight.position.set(5, 10, 3);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x6688aa, 0.5);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.4);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        // 添加一个微弱的全局点光源模拟月光
        const moonLight = new THREE.PointLight(0x88aaff, 0.3);
        moonLight.position.set(10, 20, -5);
        scene.add(moonLight);

        // --- 星空粒子（更密集，营造深邃夜空）---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2500;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPositions[i*3] = (Math.random() - 0.5) * 400;
            starsPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starsPositions[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // 添加一些漂浮的粒子（萤火虫效果）
        const fireflyCount = 400;
        const fireflyGeometry = new THREE.BufferGeometry();
        const fireflyPositions = new Float32Array(fireflyCount * 3);
        for (let i = 0; i < fireflyCount; i++) {
            fireflyPositions[i*3] = (Math.random() - 0.5) * 80;
            fireflyPositions[i*3+1] = (Math.random() - 0.5) * 20 + 1;
            fireflyPositions[i*3+2] = (Math.random() - 0.5) * 60 - 20;
        }
        fireflyGeometry.setAttribute('position', new THREE.BufferAttribute(fireflyPositions, 3));
        const fireflyMaterial = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
        const fireflies = new THREE.Points(fireflyGeometry, fireflyMaterial);
        scene.add(fireflies);

        // --- 加载猫头鹰模型（作为场景中的生物，可以靠近观察）---
        let owlModel = null;
        const loader = new GLTFLoader();
        loader.load('models/scene.glb', (gltf) => {
            owlModel = gltf.scene;
            scene.add(owlModel);
            
            // 增强材质可见性（双面渲染 + 轻微自发光）
            owlModel.traverse(child => {
                if (child.isMesh) {
                    const mat = child.material;
                    if (mat) {
                        const materials = Array.isArray(mat) ? mat : [mat];
                        materials.forEach(m => {
                            m.side = THREE.DoubleSide;
                            if (!m.emissive) m.emissive = new THREE.Color(0x332200);
                            m.emissiveIntensity = 0.35;
                            if (m.color && m.color.getHex() === 0x000000 && !m.map) {
                                m.color.setHex(0xccaa66);
                            }
                        });
                    }
                }
            });
            
            // 调整模型大小和位置（使其在场景中成为一个可接近的目标）
            const box = new THREE.Box3().setFromObject(owlModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetSize = 3.5;
            const scale = targetSize / maxDim;
            owlModel.scale.set(scale, scale, scale);
            
            // 居中并放置在场景前方（相机起始位置附近）
            const center = box.getCenter(new THREE.Vector3());
            owlModel.position.x = -center.x * scale;
            owlModel.position.y = -center.y * scale;
            owlModel.position.z = -center.z * scale;
            // 将模型放到相机前方约 8 米处，让用户能靠近观察
            owlModel.position.set(0, 1.2, -8);
            // 轻微旋转使其面向相机
            owlModel.rotation.y = Math.PI;
            
            // 添加动画（如果有）
            if (gltf.animations && gltf.animations.length) {
                const mixer = new THREE.AnimationMixer(owlModel);
                gltf.animations.forEach(clip => {
                    mixer.clipAction(clip).play();
                });
                // 存储到全局以便在动画循环中更新
                window.owlMixer = mixer;
            }
            
            console.log('猫头鹰模型已加载，位于 (0, 1.2, -8)');
        }, undefined, (error) => {
            console.error('模型加载失败:', error);
            // 如果模型加载失败，添加一个简单的猫头鹰占位球体（调试用）
            const geometry = new THREE.SphereGeometry(0.8, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0xccaa66, emissive: 0x442200 });
            const placeholder = new THREE.Mesh(geometry, material);
            placeholder.position.set(0, 1.2, -8);
            scene.add(placeholder);
        });

        // --- 添加一些简单的树木/岩石装饰（增强场景深度）---
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x5a5a6a, roughness: 0.7 });
        for (let i = 0; i < 60; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.3);
            const rock = new THREE.Mesh(rockGeo, rockMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 12 + Math.random() * 15;
            rock.position.x = Math.cos(angle) * radius;
            rock.position.z = Math.sin(angle) * radius - 5;
            rock.position.y = -0.5 + Math.random() * 1;
            rock.scale.set(1, Math.random() * 0.8 + 0.5, 1);
            scene.add(rock);
        }
        
        // 地面网格（可选，帮助感知空间）
        const gridHelper = new THREE.GridHelper(60, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        // 简单的地面反射光晕
        const groundGlow = new THREE.PointLight(0x88aaff, 0.2);
        groundGlow.position.set(0, -1, 0);
        scene.add(groundGlow);

        // --- 第一人称控制逻辑 ---
        // 移动状态
        const keyState = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            KeyW: false, KeyS: false, KeyA: false, KeyD: false,
            Space: false, ShiftLeft: false
        };
        let moveSpeed = 1;
        let lookSensitivity = 0.0006;
        let pitch = 0;    // 上下角度
        let yaw = 0;      // 左右角度
        
        // 鼠标锁定相关
        let isPointerLock = false;
        const lockStatusDiv = document.getElementById('lock-status');
        
        // 获取画布并监听锁定事件
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', lockChange);
        document.addEventListener('mozpointerlockchange', lockChange);
        
        function lockChange() {
            if (document.pointerLockElement === renderer.domElement) {
                isPointerLock = true;
                lockStatusDiv.innerHTML = '🔓 Mouse locked | ESC unlocked';
                lockStatusDiv.style.color = '#aaffaa';
                // 隐藏默认光标
                document.body.style.cursor = 'none';
                // 添加鼠标移动监听
                document.addEventListener('mousemove', onMouseMove);
            } else {
                isPointerLock = false;
                lockStatusDiv.innerHTML = '🔒 Click on the screen to lock the mouse';
                lockStatusDiv.style.color = '#FFD966';
                document.body.style.cursor = 'auto';
                document.removeEventListener('mousemove', onMouseMove);
            }
        }
        
        function onMouseMove(e) {
            if (!isPointerLock) return;
            yaw -= e.movementX * lookSensitivity;
            pitch -= e.movementY * lookSensitivity;
            // 限制俯仰角避免翻转
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
            // 应用欧拉角 (顺序 YXZ 使偏航先于俯仰)
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }
        
        // 键盘事件
        window.addEventListener('keydown', (e) => {
            if (keyState.hasOwnProperty(e.code)) {
                keyState[e.code] = true;
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (keyState.hasOwnProperty(e.code)) {
                keyState[e.code] = false;
                e.preventDefault();
            }
        });
        
        // 移动更新函数
        function updateMovement(deltaTime) {
            if (!isPointerLock) return;
            const actualSpeed = moveSpeed * deltaTime;
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            right.normalize();
            
            let move = new THREE.Vector3(0, 0, 0);
            if (keyState.KeyW || keyState.ArrowUp) move.add(forward);
            if (keyState.KeyS || keyState.ArrowDown) move.sub(forward);
            if (keyState.KeyD || keyState.ArrowRight) move.add(right);
            if (keyState.KeyA || keyState.ArrowLeft) move.sub(right);
            
            // 上下移动（飞行感，按Space上升，Shift下降）
            if (keyState.Space) move.y += 1;
            if (keyState.ShiftLeft) move.y -= 1;
            
            move.normalize();
            camera.position.x += move.x * actualSpeed;
            camera.position.z += move.z * actualSpeed;
            camera.position.y += move.y * actualSpeed * 0.8; // 垂直移动稍慢，更自然
            
            // 限制垂直范围，避免飞出世界
            camera.position.y = Math.max(0.5, Math.min(8, camera.position.y));
            // 限制水平范围（可选，让探索更有边界）
            const limit = 45;
            camera.position.x = Math.max(-limit, Math.min(limit, camera.position.x));
            camera.position.z = Math.max(-limit - 5, Math.min(limit - 5, camera.position.z));
        }
        
        // --- 动态效果：萤火虫缓慢飘动、星空旋转 ---
        let time = 0;
        
        // --- 动画循环 ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            
            // 动态效果：萤火虫粒子缓慢移动和星空旋转
            time += delta;
            fireflies.rotation.y = time * 0.05;
            stars.rotation.y += 0.0003;
            
            // 更新猫头鹰模型的动画（如果有）
            if (window.owlMixer) {
                window.owlMixer.update(delta);
            }
            
            // 让月光缓慢变化，增加氛围
            const intensity = 0.3 + Math.sin(time * 0.2) * 0.05;
            moonLight.intensity = intensity;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
        
        // --- 窗口尺寸适配 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 小提示：在控制台可调整移动速度
        console.log('🦉 First person mode activated | Movement speed: ' + moveSpeed + ' | Sensitivity: ' + lookSensitivity);
        
        // 可选：添加简单的欢迎提示
        setTimeout(() => {
            const hint = document.getElementById('controls-hint');
            hint.style.opacity = '0.8';
            setTimeout(() => {
                hint.style.opacity = '0.5';
            }, 5000);
        }, 1000);
    </script>
</body>
</html>
